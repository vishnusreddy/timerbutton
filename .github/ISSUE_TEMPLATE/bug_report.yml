name: Bug report
description: Report a TimerButton behavior, rendering, or documentation issue.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Steps or a minimal snippet that reproduces the issue.
      placeholder: |
        1. Add TimerButton with...
        2. Tap...
        3. Observe...
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: API surface
      options:
        - Compose
        - XML/View
        - Both
        - Documentation
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: TimerButton version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Android version, device/emulator, Compose version, AGP version, and any relevant app setup.
